<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIQLO Style - Panier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      .uniqlo-red {
        background-color: #ff0000;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <div id="global-header"></div>

    <main class="container mx-auto px-4 py-12 max-w-6xl">
      <h1
        class="text-2xl font-black tracking-widest uppercase mb-8 border-b border-gray-900 pb-4"
      >
        Votre Panier
      </h1>

      <div class="flex flex-col lg:flex-row gap-12">
        <div class="w-full lg:w-2/3">
          <div
            id="cart-empty-msg"
            class="hidden text-center py-12 border border-gray-100 p-8 bg-gray-50 rounded-sm shadow-sm"
          >
            <i
              class="fa-solid fa-basket-shopping text-gray-300 text-4xl mb-4"
            ></i>
            <p class="text-sm font-bold text-gray-500 uppercase tracking-wider">
              Votre panier est actuellement vide.
            </p>
            <a
              href="products.html"
              class="inline-block bg-black text-white text-xs font-bold px-6 py-3 uppercase tracking-widest mt-6 hover:bg-gray-800 transition rounded-sm"
            >
              Découvrir nos produits
            </a>
          </div>

          <div id="cart-table-container" class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="border-b-2 border-black text-[10px] font-black uppercase tracking-widest text-gray-400 pb-2"
                >
                  <th class="pb-3">Article</th>
                  <th class="pb-3">Prix</th>
                  <th class="pb-3">Quantité</th>
                  <th class="pb-3">Total</th>
                  <th class="pb-3 text-right">Action</th>
                </tr>
              </thead>
              <tbody id="cart-items-tbody"></tbody>
            </table>
          </div>
        </div>

        <div class="w-full lg:w-1/3">
          <div
            class="border border-gray-200 p-6 bg-gray-50 rounded-sm shadow-sm"
          >
            <h2
              class="text-xs font-black uppercase tracking-widest text-gray-900 mb-6 pb-2 border-b border-gray-200"
            >
              Récapitulatif
            </h2>

            <div
              class="space-y-4 text-xs font-bold uppercase tracking-wider text-gray-600"
            >
              <div class="flex justify-between">
                <span>Sous-total</span>
                <span id="summary-subtotal" class="text-gray-900">0.00 €</span>
              </div>
              <div class="flex justify-between">
                <span>Livraison</span>
                <span class="text-green-600">Gratuite</span>
              </div>
              <div
                class="flex justify-between items-center pt-4 border-t border-gray-200 text-sm font-black text-gray-900"
              >
                <span>Total TTC</span>
                <span
                  id="summary-total"
                  class="text-red-600 text-base font-black"
                  >0.00 €</span
                >
              </div>
            </div>

            <button
              onclick="checkout()"
              class="w-full bg-black text-white text-xs font-bold py-4 uppercase tracking-widest hover:bg-gray-800 transition mt-8 rounded-sm shadow-sm"
            >
              Passer à la caisse
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer
      class="bg-gray-50 border-t border-gray-200 py-12 text-xs text-center text-gray-500 mt-24"
    >
      <p class="font-bold mb-2">PROJET SANDBOX QA - CONCEPT MULTI-PAGES 2026</p>
    </footer>

    <script src="global.js"></script>
    <script>
      // 1. RENDER COMPLET DU PANIER
      function renderCart() {
        const tbody = document.getElementById('cart-items-tbody')
        const emptyMsg = document.getElementById('cart-empty-msg')
        const tableContainer = document.getElementById('cart-table-container')

        if (!tbody) return

        // Gestion de l'affichage si vide
        if (!cart || cart.length === 0) {
          if (emptyMsg) emptyMsg.classList.remove('hidden')
          if (tableContainer) tableContainer.classList.add('hidden')
          tbody.innerHTML = ''

          document.getElementById('summary-subtotal').innerText = '0.00 €'
          document.getElementById('summary-total').innerText = '0.00 €'
          return
        }

        if (emptyMsg) emptyMsg.classList.add('hidden')
        if (tableContainer) tableContainer.classList.remove('hidden')

        let totalCart = 0

        tbody.innerHTML = cart
          .map((item, index) => {
            // Liaison croisée avec products de scripts/global.js via l'ID
            const productRef = products.find((p) => p.id == item.id)

            if (!productRef) {
              return `
              <tr class="border-b border-gray-100 text-xs">
                <td class="py-4 text-gray-400 italic" colspan="5">Article introuvable (ID: ${item.id})</td>
              </tr>
            `
            }

            const itemTotal = productRef.price * item.qty
            totalCart += itemTotal

            return `
            <tr class="border-b border-gray-100 text-xs text-gray-700">
              <td class="py-4 flex items-center gap-4">
                <img src="${productRef.img}" alt="${productRef.name}" class="w-16 h-20 object-cover bg-gray-50 border border-gray-100 rounded-sm">
                <div>
                  <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${productRef.brand}</p>
                  <p class="font-bold text-gray-900 uppercase tracking-tight">${productRef.name}</p>
                  <div class="flex gap-3 text-[10px] text-gray-500 font-medium mt-1 uppercase">
                    <span>Taille : <strong class="text-black">${item.size || 'N/A'}</strong></span>
                    <span>Couleur : <strong class="text-black">${item.color || 'N/A'}</strong></span>
                  </div>
                </div>
              </td>
              <td class="py-4 font-bold text-gray-900">${productRef.price.toFixed(2)} €</td>
              <td class="py-4">
                <input 
                  type="number" 
                  min="1" 
                  value="${item.qty}" 
                  onchange="updateQty(${index}, this.value)" 
                  class="w-12 border border-gray-300 p-1 text-center font-bold focus:outline-none focus:border-black rounded-sm"
                >
              </td>
              <td class="py-4 font-black text-gray-900">${itemTotal.toFixed(2)} €</td>
              <td class="py-4 text-right">
                <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-600 transition-colors text-sm">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </td>
            </tr>
          `
          })
          .join('')

        // Mise à jour du bandeau récapitulatif à droite
        document.getElementById('summary-subtotal').innerText =
          `${totalCart.toFixed(2)} €`
        document.getElementById('summary-total').innerText =
          `${totalCart.toFixed(2)} €`
      }

      // 2. MODIFICATION DE LA QUANTITÉ
      function updateQty(index, newQty) {
        const qty = parseInt(newQty)
        if (isNaN(qty) || qty < 1) return

        cart[index].qty = qty
        saveCart()

        // Relance un rendu complet pour recalculer l'ensemble de la page
        renderCart()

        // Met également à jour le badge du panier dans le header s'il existe
        const cartCountEl = document.getElementById('cart-count')
        if (cartCountEl) {
          const totalItems = cart.reduce((sum, item) => sum + item.qty, 0)
          cartCountEl.innerText = totalItems
        }
      }

      // 3. SUPPRESSION D'UN ARTICLE
      function removeItem(index) {
        cart.splice(index, 1)
        saveCart()
        renderCart()

        const cartCountEl = document.getElementById('cart-count')
        if (cartCountEl) {
          const totalItems = cart.reduce((sum, item) => sum + item.qty, 0)
          cartCountEl.innerText = totalItems
        }
      }

      // 4. BOUTON CHECKOUT CAISSE
      function checkout() {
        const isUserLogged = localStorage.getItem('qa_user_logged')

        if (!isUserLogged) {
          alert(
            'Vous devez être connecté pour finaliser votre commande. Redirection vers la page de connexion...'
          )
          window.location.href = 'signup.html?redirect=cart'
          return
        }

        if (!cart || cart.length === 0) {
          alert('Votre panier est vide !')
          return
        }

        window.location.href = 'checkout.html'
      }

      // DANS src/cart.html, modifie la fonction saveCart comme ceci :
      // DANS src/cart.html
      function saveCart() {
        // Sauvegarde dans les deux clés pour éviter les incohérences
        localStorage.setItem('cart', JSON.stringify(cart))
        localStorage.setItem('uniqlo_cart', JSON.stringify(cart))

        // Mise à jour visuelle du badge
        const cartCountEl = document.getElementById('cart-count')
        if (cartCountEl) {
          const totalItems = cart.reduce((sum, item) => sum + item.qty, 0)
          cartCountEl.innerText = totalItems
        }
      }

      // Lancement automatique au chargement du DOM
      document.addEventListener('DOMContentLoaded', () => {
        renderCart()
      })
    </script>
  </body>
</html>
