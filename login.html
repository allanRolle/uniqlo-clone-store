<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Exercise - Home Sandbox QA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .orange-theme {
        color: #fe980f;
      }
      .bg-orange-theme {
        background-color: #fe980f;
      }
      .bg-orange-theme:hover {
        background-color: #e5870d;
      }
      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      .submenu.open {
        max-height: 200px;
      }
    </style>
  </head>
  <body class="bg-white text-gray-700 font-sans antialiased">
    <div id="global-header"></div>

    <div class="bg-gray-50 border-b border-gray-100 py-8 hidden md:block">
      <div class="container mx-auto px-4 flex justify-between items-center">
        <div>
          <h2 class="text-4xl font-bold text-gray-800 mb-2">
            <span class="orange-theme">E</span>-Automation
          </h2>
          <p class="text-gray-500 font-medium">
            La plateforme idéale pour vos scripts Selenium, Cypress, et
            Playwright.
          </p>
        </div>
      </div>
    </div>

    <main class="container mx-auto px-4 py-8">
      <div class="flex flex-col lg:flex-row gap-8">
        <aside class="w-full lg:w-1/4 shrink-0">
          <div class="border border-gray-200 rounded-sm p-4 bg-white shadow-sm">
            <h2
              class="text-xl font-bold uppercase orange-theme mb-4 tracking-tight border-b pb-2"
            >
              Category
            </h2>
            <div class="space-y-2">
              <button
                onclick="resetFilters()"
                class="w-full text-left font-semibold text-gray-700 hover:text-orange-500 py-1 border-b border-gray-50 block"
              >
                <i class="fa fa-chevron-right text-xs mr-2"></i> All Products
              </button>

              <div>
                <button
                  onclick="toggleAccordion('women-menu')"
                  class="w-full flex justify-between items-center font-semibold text-gray-700 hover:text-orange-500 py-2 border-b border-gray-50"
                >
                  <span>WOMEN</span
                  ><i class="fa fa-plus text-xs text-gray-400"></i>
                </button>
                <div id="women-menu" class="submenu pl-4 bg-gray-50 space-y-1">
                  <button
                    onclick="filterSub('Women', 'Dress')"
                    class="w-full text-left text-sm text-gray-600 hover:text-orange-500 py-1.5 block"
                  >
                    DRESS
                  </button>
                  <button
                    onclick="filterSub('Women', 'Tops')"
                    class="w-full text-left text-sm text-gray-600 hover:text-orange-500 py-1.5 block"
                  >
                    TOPS
                  </button>
                </div>
              </div>

              <div>
                <button
                  onclick="toggleAccordion('men-menu')"
                  class="w-full flex justify-between items-center font-semibold text-gray-700 hover:text-orange-500 py-2 border-b border-gray-50"
                >
                  <span>MEN</span
                  ><i class="fa fa-plus text-xs text-gray-400"></i>
                </button>
                <div id="men-menu" class="submenu pl-4 bg-gray-50 space-y-1">
                  <button
                    onclick="filterSub('Men', 'Tshirts')"
                    class="w-full text-left text-sm text-gray-600 hover:text-orange-500 py-1.5 block"
                  >
                    TSHIRTS
                  </button>
                  <button
                    onclick="filterSub('Men', 'Jeans')"
                    class="w-full text-left text-sm text-gray-600 hover:text-orange-500 py-1.5 block"
                  >
                    JEANS
                  </button>
                </div>
              </div>
            </div>

            <h2
              class="text-xl font-bold uppercase orange-theme mt-8 mb-4 tracking-tight border-b pb-2"
            >
              Brands
            </h2>
            <div
              id="brand-list-container"
              class="space-y-1 text-sm text-gray-600"
            ></div>
          </div>
        </aside>

        <section class="w-full lg:w-3/4">
          <div class="mb-6 flex gap-2 max-w-md">
            <input
              type="text"
              id="search-input"
              placeholder="Search Product..."
              class="w-full border border-gray-300 px-4 py-2 text-sm rounded-sm"
            />
            <button
              onclick="searchProducts()"
              id="submit-search"
              class="bg-orange-theme text-white px-5 rounded-sm"
            >
              <i class="fa fa-search"></i>
            </button>
          </div>
          <h2
            class="text-2xl font-bold uppercase orange-theme mb-6 border-b pb-2"
            id="products-section-title"
          >
            All Products
          </h2>
          <div
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"
            id="product-grid"
          ></div>
        </section>
      </div>
    </main>

    <div
      id="cart-modal"
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4 text-center">
        <div
          class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 text-3xl"
        >
          <i class="fa fa-check"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-1">Added!</h3>
        <p class="text-sm text-gray-500 mb-4">
          Your product has been added to cart.
        </p>
        <div class="flex flex-col gap-2">
          <a
            href="cart.html"
            class="text-blue-500 font-semibold underline text-sm py-1"
            >View Cart</a
          >
          <button
            onclick="closeModal()"
            class="bg-green-500 text-white font-bold py-2 px-4 rounded text-sm"
          >
            Continue Shopping
          </button>
        </div>
      </div>
    </div>

    <script src="global.js"></script>
    <script>
      function handleLogin(e) {
        e.preventDefault()
        const emailInput = document.getElementById('login-email')
        const passwordInput = document.getElementById('login-password')
        if (!emailInput || !passwordInput) return

        const users = JSON.parse(localStorage.getItem('ae_users')) || []
        const user = users.find(
          (u) =>
            u.email === emailInput.value && u.password === passwordInput.value
        )

        if (user) {
          localStorage.setItem('ae_session', JSON.stringify(user))
          window.location.href = 'index.html' // T'envoie vers l'accueil
        } else {
          document.getElementById('login-error')?.classList.remove('hidden')
        }
      }

      function initSignup(e) {
        e.preventDefault()
        const nameInput = document.getElementById('signup-init-name')
        const emailInput = document.getElementById('signup-init-email')
        if (!nameInput || !emailInput) return

        const users = JSON.parse(localStorage.getItem('ae_users')) || []

        if (users.find((u) => u.email === emailInput.value)) {
          document
            .getElementById('signup-init-error')
            ?.classList.remove('hidden')
          return
        }

        localStorage.setItem(
          'ae_temp_signup',
          JSON.stringify({ name: nameInput.value, email: emailInput.value })
        )
        window.location.href = 'signup.html' // Redirection
      }
    </script>
  </body>
</html>
