<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIQLO Style - Produits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      .uniqlo-red {
        background-color: #ff0000;
      }
      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      .submenu.open {
        max-height: 200px;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <div id="global-header"></div>

    <main class="container mx-auto px-4 py-12">
      <div class="flex flex-col lg:flex-row gap-12">
        <aside class="w-full lg:w-1/4 shrink-0">
          <div class="space-y-8">
            <div id="dynamic-sidebar"></div>
          </div>
        </aside>

        <div class="flex-1">
          <h1
            id="products-page-title"
            class="text-xl font-black tracking-widest uppercase mb-8 pb-4 border-b border-gray-100"
          >
            TOUS LES PRODUITS
          </h1>

          <div
            class="bg-gray-50 border border-gray-200 p-4 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 items-end rounded-sm shadow-sm"
          >
            <div>
              <label
                for="search-input"
                class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1"
                >Rechercher un article</label
              >
              <div class="relative">
                <input
                  type="text"
                  id="search-input"
                  placeholder="Ex: dress, top, winter..."
                  class="w-full text-xs font-bold border border-gray-300 p-2.5 pl-8 focus:border-black focus:outline-none uppercase rounded-sm bg-white"
                />
                <i
                  class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-xs"
                ></i>
              </div>
            </div>

            <div>
              <div class="flex justify-between items-center mb-1">
                <label
                  for="price-range"
                  class="block text-[10px] font-black uppercase tracking-widest text-gray-400"
                  >Prix maximum</label
                >
                <span id="price-val" class="text-xs font-black text-red-600"
                  >150 €</span
                >
              </div>
              <input
                type="range"
                id="price-range"
                min="0"
                max="150"
                value="150"
                step="5"
                class="w-full accent-black cursor-pointer"
              />
            </div>

            <div>
              <label
                for="sort-select"
                class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1"
                >Trier les articles</label
              >
              <select
                id="sort-select"
                class="w-full text-xs font-bold border border-gray-300 p-2.5 focus:border-black focus:outline-none rounded-sm bg-white cursor-pointer uppercase tracking-wider"
              >
                <option value="default" selected>Par défaut</option>
                <option value="low-high">Prix : du - cher au + cher</option>
                <option value="high-low">Prix : du + cher au - cher</option>
              </select>
            </div>
          </div>

          <div
            id="products-grid"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"
          ></div>
        </div>
      </div>
    </main>

    <div
      id="cart-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div
        class="bg-white p-8 max-w-sm w-full mx-4 text-center shadow-lg border border-gray-100"
      >
        <div
          class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl"
        >
          <i class="fa fa-check"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-1">Article ajouté !</h3>
        <p class="text-xs text-gray-500 mb-6">
          Le produit a bien rejoint votre panier d'achat.
        </p>
        <div class="flex flex-col gap-2">
          <a
            href="cart.html"
            class="bg-black text-white text-xs font-bold py-3 uppercase tracking-wider hover:bg-gray-800 transition block"
            >Voir le panier</a
          >
          <button
            onclick="closeModal()"
            class="border border-gray-300 text-gray-700 text-xs font-bold py-3 uppercase tracking-wider hover:bg-gray-50 transition"
          >
            Continuer mes achats
          </button>
        </div>
      </div>
    </div>

    <footer
      class="bg-gray-50 border-t border-gray-200 py-12 text-xs text-center text-gray-500 mt-24"
    >
      <p class="font-bold mb-2">PROJET SANDBOX QA - CONCEPT MULTI-PAGES 2026</p>
    </footer>

    <script src="global.js"></script>
    <script type="module">
      import { getProducts } from './api.js'
      let products = []
      let selectedBrand = null
      let baseProducts = []

      // 2. Fonction de filtrage appelée dès que possible
      async function initProductsPage() {
        // 1. Appel de l'API
        products = await getProducts()

        // 2. Logique de filtrage (copiée de votre code)
        const params = new URLSearchParams(window.location.search)
        const catParam = params.get('cat')

        let filtered = [...products]

        if (catParam) {
          const catMapping = { homme: 'Men', femme: 'Women', enfant: 'Kids' }
          const searchCat = catMapping[catParam.toLowerCase()] || catParam
          filtered = filtered.filter(
            (p) =>
              p.category &&
              p.category.toLowerCase().includes(searchCat.toLowerCase())
          )
        }

        // On met à jour la variable globale qui sert au rendu
        baseProducts = filtered

        // 3. IMPORTANT : On appelle l'injection AVANT le rendu
        // Si forceSidebarInjection existe dans scripts/global.js, on le garde
        if (typeof forceSidebarInjection === 'function') {
          forceSidebarInjection()
        }

        // Rendu final
        if (typeof renderProducts === 'function') {
          renderProducts(baseProducts)
        }
      }

      // Lancement
      document.addEventListener('DOMContentLoaded', initProductsPage)

      // Lancement
      initProductsPage()

      // 1. Rendu des fiches produits avec les boutons "Voir" et "Ajouter"
      function renderProducts(productsList) {
        const grid = document.getElementById('products-grid')
        if (!grid) return

        if (!productsList || productsList.length === 0) {
          grid.innerHTML = `
                <div class="col-span-full text-center py-12 text-gray-400 font-bold uppercase tracking-widest">
                  Aucun produit trouvé
                </div>
              `
          return
        }

        grid.innerHTML = productsList
          .map(
            (product) => `
              <div class="group border border-gray-100 p-4 hover:shadow-xl transition-all duration-300 bg-white flex flex-col h-full rounded-sm">
                <div class="relative overflow-hidden bg-gray-50 mb-4 aspect-[3/4] flex items-center justify-center">
                  <img src="${product.img}" alt="${product.name}" class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500">
                </div>

                <div class="flex-1 flex flex-col justify-between">
                  <div class="mb-4">
                    <div class="flex justify-between items-start mb-1">
                      <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${product.brand}</p>
                      <p class="text-xs font-black text-red-600">${product.price.toFixed(2)} €</p>
                    </div>
                    <a href="product-detail.html?id=${product.id}" class="text-xs font-bold text-gray-900 uppercase hover:text-red-600 transition-colors line-clamp-2 tracking-tight">
                      ${product.name}
                    </a>
                  </div>

                  <div class="grid grid-cols-2 gap-2 mt-auto pt-2">
                    <a
                      href="product-detail.html?id=${product.id}"
                      class="border border-black text-black text-center text-[9px] font-black py-2.5 uppercase tracking-wider hover:bg-gray-50 transition-colors rounded-sm"
                    >
                      Voir le produit
                    </a>
                    <button
                      onclick="addToCart(${product.id})"
                      class="bg-black text-white text-[9px] font-black py-2.5 uppercase tracking-wider hover:bg-gray-800 transition-colors rounded-sm"
                    >
                      Ajouter au panier
                    </button>
                  </div>
                </div>
              </div>
            `
          )
          .join('')
      }

      // 2. Génération dynamique de la Sidebar (Comptage automatique)
      function forceSidebarInjection() {
        const sidebar = document.getElementById('dynamic-sidebar')
        if (!sidebar || typeof products === 'undefined') return

        const subcatCounts = {}
        const brandCounts = {}

        products.forEach((p) => {
          if (p.subcategory) {
            subcatCounts[p.subcategory] = (subcatCounts[p.subcategory] || 0) + 1
          }
          if (p.brand) {
            brandCounts[p.brand] = (brandCounts[p.brand] || 0) + 1
          }
        })

        const subcatHTML = Object.keys(subcatCounts)
          .map(
            (subcat) => `
              <li>
                <a href="products.html?subcat=${encodeURIComponent(subcat.toLowerCase())}" class="hover:text-red-600 transition-colors flex justify-between items-center py-0.5">
                  <span>${subcat}</span>
                  <span class="text-[10px] text-gray-400 font-normal font-mono">(${subcatCounts[subcat]})</span>
                </a>
              </li>
            `
          )
          .join('')

        const brandHTML = Object.keys(brandCounts)
          .map(
            (brand) => `
              <li>
                <a href="#" onclick="filterByBrand('${brand}'); return false;" class="hover:text-red-600 transition-colors flex justify-between items-center py-0.5 ${selectedBrand === brand ? 'text-red-600 font-black' : ''}">
                  <span>${brand}</span>
                  <span class="text-[10px] text-gray-400 font-normal font-mono">(${brandCounts[brand]})</span>
                </a>
              </li>
            `
          )
          .join('')

        sidebar.innerHTML = `
              <div class="border border-gray-200 p-6 bg-white rounded-sm space-y-8 shadow-sm">
                <div>
                  <h2 class="text-xs font-black uppercase tracking-widest text-gray-900 mb-4 pb-2 border-b-2 border-black">Catégories</h2>
                  <ul class="space-y-2 text-xs font-bold uppercase tracking-wider text-gray-600">
                    <li><a href="products.html?cat=women" class="hover:text-red-600 transition-colors">Femme</a></li>
                    <li><a href="products.html?cat=men" class="hover:text-red-600 transition-colors">Homme</a></li>
                    <li><a href="products.html?cat=kids" class="hover:text-red-600 transition-colors">Enfant</a></li>
                  </ul>
                </div>

                <div>
                  <h2 class="text-xs font-black uppercase tracking-widest text-gray-900 mb-4 pb-2 border-b-2 border-black">Types d'articles</h2>
                  <ul class="space-y-2 text-xs font-bold uppercase tracking-wider text-gray-600">
                    ${subcatHTML}
                  </ul>
                </div>

                <div>
                  <h2 class="text-xs font-black uppercase tracking-widest text-gray-900 mb-4 pb-2 border-b-2 border-black">Marques</h2>
                  <ul class="space-y-2 text-xs font-bold uppercase tracking-wider text-gray-600">
                    <li class="mb-3">
                      <a href="products.html" class="text-gray-900 hover:text-red-600 flex justify-between items-center font-black pb-1 border-b border-dashed border-gray-200">
                        <span>Toutes les marques</span>
                        <span class="text-[10px] text-gray-400 font-normal font-mono">(${products.length})</span>
                      </a>
                    </li>
                    ${brandHTML}
                  </ul>
                </div>
              </div>
            `
      }

      window.filterByBrand = function (brandName) {
        selectedBrand = brandName
        forceSidebarInjection()

        const pageTitleEl = document.getElementById('products-page-title')
        if (pageTitleEl)
          pageTitleEl.innerText = `MARQUE : ${brandName.toUpperCase()}`

        const searchInput = document.getElementById('search-input')
        if (searchInput) {
          searchInput.dispatchEvent(new Event('input'))
        }
      }

      // 3. Initialisation et Filtrage Global Croisé

      document.addEventListener('DOMContentLoaded', () => {
        if (typeof products === 'undefined') return

        const params = new URLSearchParams(window.location.search)
        const catParam = params.get('cat')
        const subcatParam = params.get('subcat')

        // TABLE DE CORRESPONDANCE (Pour régler les problèmes de Men/Homme, Women/Femme)
        const catMapping = {
          homme: 'Men',
          femme: 'Women',
          enfant: 'Kids',
        }

        // 1. Filtrage initial
        let filtered = [...products]

        if (catParam) {
          const searchCat = catMapping[catParam.toLowerCase()] || catParam
          filtered = filtered.filter((p) => {
            const cat = p.category ? p.category.toLowerCase() : ''
            return cat.includes(searchCat.toLowerCase())
          })
          const titleEl = document.getElementById('products-page-title')
          if (titleEl)
            titleEl.innerText = `CATÉGORIE : ${catParam.toUpperCase()}`
        }

        if (subcatParam) {
          filtered = filtered.filter(
            (p) => p.subcategory.toLowerCase() === subcatParam.toLowerCase()
          )
          const titleEl = document.getElementById('products-page-title')
          if (titleEl) titleEl.innerText = `TYPE : ${subcatParam.toUpperCase()}`
        }

        // 2. Initialisation de la source de vérité
        baseProducts = filtered

        // Rendu initial
        if (typeof forceSidebarInjection === 'function') forceSidebarInjection()
        if (typeof renderProducts === 'function') renderProducts(baseProducts)

        // 3. Gestion des filtres manuels
        const searchInput = document.getElementById('search-input')
        const priceRange = document.getElementById('price-range')
        const priceVal = document.getElementById('price-val')
        const sortSelect = document.getElementById('sort-select')

        function applyFilters() {
          const searchText = searchInput
            ? searchInput.value.trim().toLowerCase()
            : ''
          const maxPrice = priceRange ? parseFloat(priceRange.value) : 150
          const sortOrder = sortSelect ? sortSelect.value : 'default'

          let filteredList = baseProducts.filter((product) => {
            const matchText =
              product.name.toLowerCase().includes(searchText) ||
              product.category.toLowerCase().includes(searchText) ||
              product.subcategory.toLowerCase().includes(searchText)
            const matchPrice = product.price <= maxPrice
            const matchBrand =
              typeof selectedBrand !== 'undefined' && selectedBrand
                ? product.brand.toLowerCase() === selectedBrand.toLowerCase()
                : true
            return matchText && matchPrice && matchBrand
          })

          if (sortOrder === 'low-high')
            filteredList.sort((a, b) => a.price - b.price)
          if (sortOrder === 'high-low')
            filteredList.sort((a, b) => b.price - a.price)

          if (priceVal) priceVal.innerText = `${maxPrice.toFixed(0)} €`
          renderProducts(filteredList)
        }

        if (searchInput) searchInput.addEventListener('input', applyFilters)
        if (priceRange) priceRange.addEventListener('input', applyFilters)
        if (sortSelect) sortSelect.addEventListener('change', applyFilters)
      })
    </script>
  </body>
</html>
