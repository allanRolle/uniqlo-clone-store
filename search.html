<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIQLO Style - Résultats de recherche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <div id="global-header"></div>

    <main class="container mx-auto px-4 py-12 max-w-7xl">
      <div class="mb-8">
        <h1 class="text-2xl font-black uppercase tracking-widest text-gray-900">
          Résultats de recherche
        </h1>
        <p id="search-term-shadow" class="text-sm text-gray-500 mt-2">
          Recherche en cours...
        </p>
      </div>

      <div
        id="products-grid"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-12"
      ></div>

      <div id="no-results" class="hidden text-center py-24 space-y-4">
        <i class="fa-solid fa-magnifying-glass text-4xl text-gray-300"></i>
        <p class="text-sm font-bold text-gray-500 uppercase tracking-wider">
          Aucun produit ne correspond à votre recherche.
        </p>
        <a
          href="products.html"
          class="inline-block bg-black text-white text-xs font-bold px-6 py-3 uppercase tracking-widest hover:bg-red-600 transition"
          >Voir tout le catalogue</a
        >
      </div>
    </main>

    <footer
      class="bg-gray-50 border-t border-gray-200 py-12 text-xs text-center text-gray-500 mt-24"
    >
      <p class="font-bold mb-2">PROJET SANDBOX QA - CONCEPT MULTI-PAGES 2026</p>
    </footer>

    <script src="global.js"></script>
    <script>
      // Fonction principale qui extrait la recherche et filtre le catalogue
      function executeSearch() {
        const urlParams = new URLSearchParams(window.location.search)
        const query = urlParams.get('query')

        const shadowEl = document.getElementById('search-term-shadow')
        const gridEl = document.getElementById('products-grid')
        const noResultsEl = document.getElementById('no-results')

        if (!query) {
          if (shadowEl) shadowEl.innerText = 'Aucun mot-clé saisi.'
          if (noResultsEl) noResultsEl.classList.remove('hidden')
          return
        }

        // Met à jour le texte de contexte (ex: "Résultats pour : PULL")
        if (shadowEl) {
          shadowEl.innerHTML = `Résultats pour le mot-clé : <span class="font-bold text-black border-b border-black">"${query}"</span>`
        }

        // VERIFICATION ET ATTENTE DES PRODUITS
        // Si le tableau 'products' n'existe pas encore, on attend 100ms et on réessaye
        if (typeof products === 'undefined' || products.length === 0) {
          console.log(
            "Données 'products' indisponibles, nouvelle tentative dans 100ms..."
          )
          setTimeout(executeSearch, 100)
          return
        }

        console.log(
          "Catalogue chargé dans search.html. Nombre d'articles :",
          products.length
        )

        // Filtrage des produits
        const cleanQuery = query.toLowerCase().trim()
        const filtered = products.filter(
          (p) =>
            (p.name && p.name.toLowerCase().includes(cleanQuery)) ||
            (p.description && p.description.toLowerCase().includes(cleanQuery))
        )

        // Gestion de l'affichage
        if (filtered.length === 0) {
          if (gridEl) gridEl.innerHTML = ''
          if (noResultsEl) noResultsEl.classList.remove('hidden')
        } else {
          if (noResultsEl) noResultsEl.classList.add('hidden')

          // Appel de la fonction globale de rendu
          if (typeof renderProducts === 'function') {
            renderProducts(filtered)
          } else {
            console.error("La fonction 'renderProducts' est introuvable.")
          }
        }
      }

      // Lancement synchrone
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', executeSearch)
      } else {
        executeSearch()
      }
    </script>
  </body>
</html>
